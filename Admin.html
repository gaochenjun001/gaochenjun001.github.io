<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高辰君 | 后台管理</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="assets/logo.jpg">
    <style>
        /* 强制背景样式，防止加载闪烁 */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* 默认背景图 (雪地生存) */
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1548263594-a71ea65a8598?q=80&w=2076&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #e3e8ed;
        }
        .admin-container {
            background-color: rgba(255, 255, 255, 0.95); /* 增加一点透明度 */
            padding: 40px;
            border-radius: 15px;
            width: 90%;
            max-width: 800px; /* 宽屏适配 */
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            color: #333;
            backdrop-filter: blur(10px); /* 毛玻璃效果 */
        }
    </style>
</head>
<body class="bg-minecraft-snow">

    <div class="admin-container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
            <h2>后台管理</h2>
            <a href="index.html" class="btn" style="padding: 8px 15px; font-size: 0.9rem;">返回首页</a>
        </div>
        
        <!-- 登录区域 -->
        <div id="login-section">
            <form id="login-form">
                <div class="form-group">
                    <label for="admin-pass">管理员登录</label>
                    <input type="password" id="admin-pass" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn" style="width:100%">登录</button>
            </form>
        </div>

        <!-- 管理面板 -->
        <div id="admin-panel" style="display:none;">
            
            <div style="margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 20px;">
                <h3 style="margin-bottom: 15px; font-size: 1.1rem; display: flex; align-items: center; gap: 10px;">
                    💻 服务器实时监控 
                    <span style="font-size: 0.8rem; background: #d1fae5; color: #065f46; padding: 2px 8px; border-radius: 12px; font-weight: normal;">Online</span>
                </h3>
                
                <!-- 仪表盘指标 -->
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px;">
                    <!-- 注册用户卡片 -->
                    <div style="background: rgba(255,255,255,0.5); padding: 15px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.1);">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                            <span style="font-weight: bold; color: #555;">注册用户</span>
                            <span id="cpu-text" style="font-weight: bold; color: #2563eb;">--</span>
                        </div>
                        <div style="width: 100%; height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden;">
                            <div id="cpu-bar" style="width: 0%; height: 100%; background: #2563eb; transition: width 0.5s ease;"></div>
                        </div>
                        <p style="font-size: 0.75rem; color: #888; margin-top: 5px;">统计范围: 本地数据库用户</p>
                    </div>

                    <!-- 网络卡片 -->
                    <div style="background: rgba(255,255,255,0.5); padding: 15px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.1);">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                            <span style="font-weight: bold; color: #555;">服务器延迟</span>
                            <span id="ping-text" style="font-weight: bold; color: #10b981;">-- ms</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 5px;">
                            <div id="status-dot" style="width: 8px; height: 8px; background: #10b981; border-radius: 50%;"></div>
                            <span style="font-size: 0.8rem; color: #666;">状态: <span id="conn-status">检测中...</span></span>
                        </div>
                        <p style="font-size: 0.75rem; color: #888; margin-top: 5px;">连接目标: 本机/服务器</p>
                    </div>

                    <!-- 内存/数据库卡片 -->
                    <div style="background: rgba(255,255,255,0.5); padding: 15px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.1);">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                            <span style="font-weight: bold; color: #555;">数据库存储</span>
                            <span id="ram-text" style="font-weight: bold; color: #8b5cf6;">--%</span>
                        </div>
                        <div style="width: 100%; height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden;">
                            <div id="ram-bar" style="width: 0%; height: 100%; background: #8b5cf6; transition: width 0.5s ease;"></div>
                        </div>
                        <p style="font-size: 0.75rem; color: #888; margin-top: 5px;">类型: LocalStorage</p>
                    </div>

                    <!-- 访客卡片 -->
                    <div style="background: rgba(255,255,255,0.5); padding: 15px; border-radius: 10px; border: 1px solid rgba(0,0,0,0.1);">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                            <span style="font-weight: bold; color: #555;">访问总人数</span>
                            <span id="visitor-text" style="font-weight: bold; color: #f59e0b; display:none;">--</span>
                        </div>
                        <div style="display: flex; align-items: flex-end; gap: 5px; height: 20px;">
                            <span style="font-size: 2rem; line-height: 1; font-weight: 800; color: #1f2937;" id="visitor-count">0</span>
                            <span style="font-size: 0.8rem; color: #6b7280; margin-bottom: 4px;">人次</span>
                        </div>
                        <p style="font-size: 0.75rem; color: #888; margin-top: 5px;">统计自: 本地数据库</p>
                    </div>
                </div>

                <!-- 网页预览 -->
                <div style="width: 100%; height: 400px; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; background: #000; position: relative;">
                    <div style="position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.7); color: white; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem;">实时预览</div>
                    <iframe src="http://49.233.95.215/" style="width: 100%; height: 100%; border: none;" title="Server Monitor"></iframe>
                </div>
                <div style="display: flex; justify-content: space-between; margin-top: 5px;">
                    <p style="font-size: 0.8rem; color: #666;">目标主机: 49.233.95.215</p>
                    <p style="font-size: 0.8rem; color: #666;">最后更新: <span id="last-update-time">--:--:--</span></p>
                </div>
            </div>

            <p style="margin-bottom:15px; text-align:center;">🎨 选择网站主题背景</p>
            <div class="admin-controls">
                <div class="color-btn" style="background:#f3f4f6;" data-theme="bg-default">默认白</div>
                <div class="color-btn" style="background:#1a1a1a; color:#fff;" data-theme="bg-dark">极客黑</div>
                <div class="color-btn" style="background:#e0f2fe;" data-theme="bg-blue">清爽蓝</div>
                <div class="color-btn" style="background:linear-gradient(45deg, #2c3e50, #27ae60); color:#fff;" data-theme="bg-minecraft">Minecraft</div>
                <div class="color-btn" style="background:linear-gradient(45deg, #0f2027, #203a43); color:#fff;" data-theme="bg-code">黑客帝国</div>
                <div class="color-btn" style="background:url('https://images.unsplash.com/photo-1548263594-a71ea65a8598?q=80&w=2076&auto=format&fit=crop'); background-size:cover; color:#fff; text-shadow:0 1px 3px rgba(0,0,0,0.8);" data-theme="bg-minecraft-snow">雪地生存</div>
            </div>
            <button id="logout-btn" class="btn" style="margin-top:20px; width:100%; background:#ef4444; color:white;">退出登录</button>
        </div>
    </div>

    <script src="js/database.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
