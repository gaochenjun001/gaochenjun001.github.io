<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>关于 | 高辰君</title>

<style>
/* ===== 同projects（完全一致）===== */
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:"Segoe UI";
color:#fff;
min-height:100vh;

background:
linear-gradient(rgba(0,0,0,0),rgba(0,0,0,0)),
url('https://images.unsplash.com/photo-1501785888041-af3ef285b470') center/cover fixed;
}

@keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;}}
@keyframes liquid{0%{background-position:0%}100%{background-position:100%}}

.glass{
position:fixed;
left:16px;right:16px;
padding:10px 20px;border-radius:25px;
display:flex;align-items:center;

background:linear-gradient(120deg,rgba(255,255,255,0.15),rgba(120,180,255,0.25),rgba(255,255,255,0.15));
background-size:200%;
animation:liquid 8s linear infinite;

backdrop-filter:blur(30px);
box-shadow:0 8px 30px rgba(0,0,0,0.4);
}

header{top:10px;}
footer{bottom:12px;justify-content:center;font-size:13px;}

.logo{display:flex;gap:10px;align-items:center;}
.logo img{width:34px;height:34px;border-radius:50%;}

nav{margin-left:auto;display:flex;gap:18px;align-items:center;}
nav a{color:#fff;text-decoration:none;font-size:14px;}

.lang-box{position:relative;}
.lang-current{
padding:6px 12px;border-radius:20px;
background:rgba(0,0,0,0.25);
cursor:pointer;
display:flex;align-items:center;gap:6px;
}

.lang-menu{
position:absolute;top:45px;right:0;
width:260px;background:rgba(0,0,0,0.8);
border-radius:12px;display:none;
}

.lang-menu div{padding:10px;cursor:pointer;}
.lang-menu div:hover{background:rgba(255,255,255,0.2);}

.container{
margin-top:140px;
text-align:center;
animation:fadeIn 1s;
}

.card{
margin:20px auto;
max-width:340px;
padding:20px;
border-radius:18px;

background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
}
</style>
</head>

<body>

<header class="glass">
<div class="logo">
<img src="assets/logo.jpg">
<span>高辰君</span>
</div>

<nav>
<a href="index.html" data-key="home">首页</a>
<a href="projects.html" data-key="projects">项目</a>
<a href="about.html" data-key="about">关于</a>

<div class="lang-box">
<div class="lang-current" onclick="toggleLang(event)" id="currentLang">
🌐 简体中文（中国）
</div>

<div class="lang-menu" id="langMenu">
<div onclick="setLang('zh-cn')">简体中文（中国）</div>
<div onclick="setLang('zh-hk')">繁體中文（中國香港特別行政區）</div>
<div onclick="setLang('zh-tw')">繁體中文（中國台灣省）</div>
<div onclick="setLang('en')">English (US)</div>
</div>
</div>

</nav>
</header>

<div class="container">

<h1 id="title">关于本人</h1>

<div class="card">
<p id="text">我是高辰君，一个热爱编程和 Minecraft 的开发者。</p>
</div>

</div>

<div class="container">

<h1 id="title">关于本站</h1>

<div class="card">
<p id="text">版本：3.0.0</p>
</div>

</div>

<footer class="glass">
<span>Copyright © 2018-2026 高辰君 · All Rights Reserved</span>
</footer>

<script>
const langData={
"zh-cn":{home:"首页",projects:"项目",about:"关于",title:"关于本人",text:"我是高辰君，一个热爱编程和 Minecraft 的开发者。"},
"zh-hk":{home:"首頁",projects:"項目",about:"關於",title:"關於本人",text:"我係高辰君，一個熱愛編程同 Minecraft 嘅開發者。"},
"zh-tw":{home:"首頁",projects:"專案",about:"關於",title:"關於本人",text:"我是高辰君，一位熱愛程式設計與 Minecraft 的開發者。"},
"en":{home:"Home",projects:"Projects",about:"About",title:"About Me",text:"I am Gao Chenjun, a developer who loves programming and Minecraft."}
};

function setLang(l){
localStorage.setItem("lang",l);
apply(l);
}

function apply(l){
const t=langData[l];

title.innerText=t.title;
text.innerText=t.text;

document.querySelectorAll("[data-key]").forEach(el=>{
el.innerText=t[el.getAttribute("data-key")];
});

currentLang.innerText=document.querySelector(`#langMenu div[onclick="setLang('${l}')"]`).innerText;
}

window.onload=()=>apply(localStorage.getItem("lang")||"zh-cn");

function toggleLang(e){
e.stopPropagation();
langMenu.style.display=langMenu.style.display==="block"?"none":"block";
}
document.addEventListener("click",()=>langMenu.style.display="none");
</script>

</body>
</html>
